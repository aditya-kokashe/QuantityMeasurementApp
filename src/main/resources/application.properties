# 1. Basic App Info
spring.application.name=Quantity Measurement App
server.port=8081

# 2. H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:quantitymeasurementdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# 3. JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# 4. Logging & Security (Stops the confusion)
logging.level.root=INFO
logging.level.com.app.quantitymeasurement=DEBUG
# This line stops the "Generated Security Password" from cluttering your console
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# 5. Actuator & Swagger
management.endpoints.web.exposure.include=health,metrics
springdoc.swagger-ui.enabled=true


# 6. CORS Configuration
spring.web.cors.allowed-origins=http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
 
